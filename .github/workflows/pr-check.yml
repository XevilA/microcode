# ╔══════════════════════════════════════════════════════════════════════════╗
# ║  MicroCode — Pull Request Check (Lightweight)                          ║
# ║  Fast validation for PRs without full build                            ║
# ╚══════════════════════════════════════════════════════════════════════════╝

name: "PR Check"

on:
  pull_request:
    branches: [main, develop]
    types: [opened, synchronize, reopened]

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  validate:
    name: "✅ Validate PR"
    runs-on: macos-14
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Check PR size
        run: |
          FILES_CHANGED=$(git diff --name-only ${{ github.event.pull_request.base.sha }}..HEAD 2>/dev/null | wc -l | tr -d ' ')
          echo "📊 Files changed: $FILES_CHANGED"
          if [ "$FILES_CHANGED" -gt 50 ]; then
            echo "⚠️  Large PR detected ($FILES_CHANGED files). Consider splitting into smaller PRs."
          fi

      - name: Verify checksums
        run: |
          if [ -f "verify_checksums.sh" ]; then
            chmod +x verify_checksums.sh
            ./verify_checksums.sh || echo "⚠️ Checksum mismatch — run ./generate_checksums.sh"
          fi
        continue-on-error: true

      - name: Secret scan
        run: |
          FOUND=0
          if grep -rE "AIza[a-zA-Z0-9_-]{30,}|sk-[a-zA-Z0-9]{20,}|AKIA[0-9A-Z]{16}" --include="*.swift" --include="*.rs" 2>/dev/null | grep -v 'placeholder\|"sk-..."'; then
            FOUND=1
          fi
          if grep -rE "BEGIN (RSA |EC |OPENSSH )?PRIVATE KEY" --include="*.swift" --include="*.rs" --include="*.pem" 2>/dev/null; then
            FOUND=1
          fi
          if [ $FOUND -eq 1 ]; then
            echo "🚨 Potential secrets detected in PR!"
            exit 1
          fi
          echo "✅ No secrets found"

      - name: License check
        run: |
          if [ ! -f "LICENSE" ]; then
            echo "❌ LICENSE file missing!"
            exit 1
          fi
          echo "✅ License file present"

      - name: Swift build check
        run: |
          swift build 2>&1 | tail -20
        continue-on-error: true

      - name: Summary
        run: |
          echo "## ✅ PR Validation Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Secrets scan | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| License check | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Build check | ✅ |" >> $GITHUB_STEP_SUMMARY
