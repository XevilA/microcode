# ╔══════════════════════════════════════════════════════════════════════════╗
# ║  MicroCode — Production CI/CD Pipeline v2.0                            ║
# ║  Security → Lint → Build → Test → Sign → Release                      ║
# ╚══════════════════════════════════════════════════════════════════════════╝

name: "CI/CD"

on:
  push:
    branches: [main, develop, "release/**"]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      build_type:
        description: "Build type"
        required: false
        default: "debug"
        type: choice
        options: [debug, release, distribution]
      skip_tests:
        description: "Skip tests"
        required: false
        default: false
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: read

env:
  APP_NAME: MicroCode
  BUNDLE_ID: com.dotmini.codetunner
  MACOSX_DEPLOYMENT_TARGET: "13.0"
  RUST_BACKTRACE: 1
  CARGO_TERM_COLOR: always

jobs:
  # ══════════════════════════════════════════════════════════════════════════
  # Job 1: Security & Integrity Check
  # ══════════════════════════════════════════════════════════════════════════
  security:
    name: "🔐 Security"
    runs-on: macos-14
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Verify SHA256 checksums
        run: |
          if [ -f "CHECKSUMS.sha256" ] && [ -f "verify_checksums.sh" ]; then
            chmod +x verify_checksums.sh
            ./verify_checksums.sh
          else
            echo "⚠️ No checksums found — skipping"
          fi

      - name: Scan for hardcoded secrets
        run: |
          echo "🔍 Scanning for hardcoded secrets..."
          FOUND=0

          # Google API keys
          if grep -rE "AIza[a-zA-Z0-9_-]{30,}" --include="*.swift" --include="*.rs" 2>/dev/null; then
            echo "❌ Found Google API key"; FOUND=1
          fi

          # OpenAI keys
          if grep -rE "sk-[a-zA-Z0-9]{20,}" --include="*.swift" --include="*.rs" 2>/dev/null | grep -v 'placeholder\|"sk-..."'; then
            echo "❌ Found OpenAI key"; FOUND=1
          fi

          # AWS keys
          if grep -rE "AKIA[0-9A-Z]{16}" --include="*.swift" --include="*.rs" 2>/dev/null; then
            echo "❌ Found AWS key"; FOUND=1
          fi

          # Private keys
          if grep -rE "BEGIN (RSA |EC |OPENSSH )?PRIVATE KEY" --include="*.swift" --include="*.rs" --include="*.pem" 2>/dev/null; then
            echo "❌ Found private key"; FOUND=1
          fi

          # Hardcoded IPs (non-localhost)
          if grep -rE "http://[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+" --include="*.swift" --include="*.rs" 2>/dev/null | grep -v "127.0.0.1\|0.0.0.0"; then
            echo "❌ Found hardcoded IP"; FOUND=1
          fi

          if [ $FOUND -eq 1 ]; then
            echo "🚨 Secret scan FAILED"
            exit 1
          fi
          echo "✅ No secrets found"

      - name: Check license headers
        run: |
          echo "📄 Checking LICENSE file exists..."
          if [ ! -f "LICENSE" ]; then
            echo "❌ LICENSE file missing!"
            exit 1
          fi
          echo "✅ LICENSE found"

  # ══════════════════════════════════════════════════════════════════════════
  # Job 2: Swift Lint & Analysis (parallel with security)
  # ══════════════════════════════════════════════════════════════════════════
  lint:
    name: "🔍 Lint"
    runs-on: macos-14
    timeout-minutes: 15
    if: "!startsWith(github.ref, 'refs/tags/v')"

    steps:
      - uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Swift syntax check
        run: |
          echo "🔍 Running Swift compilation check..."
          swift package resolve 2>/dev/null || true
          swift build 2>&1 | head -100
          echo "✅ Swift compilation check complete"
        continue-on-error: true

      - name: Rust lint
        run: |
          if [ -d "backend" ]; then
            cd backend
            cargo check 2>&1 | tail -20
            cargo clippy --all-targets -- -W clippy::all 2>&1 | tail -30 || true
          fi
        continue-on-error: true

      - name: Check for TODO/FIXME in production code
        run: |
          echo "📝 Scanning for TODO/FIXME markers..."
          COUNT=$(grep -rn "TODO\|FIXME\|HACK\|XXX" --include="*.swift" --include="*.rs" 2>/dev/null | wc -l | tr -d ' ')
          echo "   Found $COUNT markers (informational only)"

  # ══════════════════════════════════════════════════════════════════════════
  # Job 3: Build (depends on security)
  # ══════════════════════════════════════════════════════════════════════════
  build-arch:
    name: "🔨 Build ${{ matrix.arch }}"
    needs: security
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            os: macos-14

    outputs:
      version: ${{ steps.version.outputs.version }}
      build_number: ${{ steps.version.outputs.build_number }}
      short_sha: ${{ steps.version.outputs.short_sha }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          elif git describe --tags --abbrev=0 2>/dev/null; then
            VERSION="$(git describe --tags --abbrev=0 | sed 's/^v//')"
          else
            VERSION="1.0.0"
          fi
          BUILD_NUMBER=$(git rev-list --count HEAD)
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "build_number=${BUILD_NUMBER}" >> $GITHUB_OUTPUT
          echo "short_sha=${SHORT_SHA}" >> $GITHUB_OUTPUT

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install system dependencies
        run: |
          brew install protobuf 2>/dev/null || true

      - name: Install Rust toolchain
        run: |
          # Remove any conflicting rustup-init from Homebrew that shadows real cargo
          brew unlink rustup 2>/dev/null || true
          brew unlink rustup-init 2>/dev/null || true

          # Install Rust via rustup.rs (the canonical way)
          if ! command -v rustup &>/dev/null || ! ~/.cargo/bin/cargo --version &>/dev/null; then
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable --no-modify-path
          fi

          # Source the cargo environment NOW for this step
          source "$HOME/.cargo/env"

          # Add to GITHUB_PATH so ALL subsequent steps see it first
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

          # Add cross-compilation target
          RUST_TARGET=${{ matrix.arch == 'arm64' && 'aarch64-apple-darwin' || 'x86_64-apple-darwin' }}
          ~/.cargo/bin/rustup target add "$RUST_TARGET"

          # Verify
          ~/.cargo/bin/cargo --version
          ~/.cargo/bin/rustc --version
          echo "✅ Rust toolchain ready: $(~/.cargo/bin/cargo --version)"

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            backend -> target
            microcode_core -> target
          shared-key: microcode-rust-${{ matrix.arch }}

      - name: Cache Swift PM
        uses: actions/cache@v4
        with:
          path: .build
          key: ${{ matrix.os }}-spm-${{ hashFiles('**/Package.resolved', 'Package.swift') }}
          restore-keys: |
            ${{ matrix.os }}-spm-

      - name: Prepare build
        run: |
          chmod +x build_distribution.sh bundle_runtimes.sh generate_checksums.sh 2>/dev/null || true
          VERSION="${{ steps.version.outputs.version }}"
          if [ -f "build_distribution.sh" ]; then
            sed -i '' "s/^VERSION=\".*\"/VERSION=\"${VERSION}\"/" build_distribution.sh 2>/dev/null || true
          fi

      - name: Cache runtime downloads
        uses: actions/cache@v4
        with:
          path: .runtime_cache
          key: runtimes-${{ matrix.arch }}-v3
          restore-keys: |
            runtimes-${{ matrix.arch }}-

      - name: "🏗️ Build Full DMG (${{ matrix.arch }})"
        run: |
          # Ensure cargo is on PATH (belt-and-suspenders)
          source "$HOME/.cargo/env" 2>/dev/null || true
          export PATH="$HOME/.cargo/bin:$PATH"
          echo "cargo: $(which cargo) — $(cargo --version)"
          ./build_distribution.sh --arch ${{ matrix.arch }} --mode full
        env:
          CI: true
          BUILD_NUMBER: ${{ steps.version.outputs.build_number }}

      - name: Upload Raw Binaries for Lite
        uses: actions/upload-artifact@v4
        with:
          name: raw-binaries-${{ matrix.arch }}
          path: .build_dist/${{ matrix.arch }}/
          retention-days: 1
          if-no-files-found: warn

      - name: Collect DMG
        run: |
          mkdir -p build-output
          cp Dist/${{ matrix.arch }}/*.dmg build-output/ 2>/dev/null || true

      - name: Upload Full DMG
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ steps.version.outputs.version }}-${{ steps.version.outputs.short_sha }}-${{ matrix.arch }}
          path: build-output/
          retention-days: 14
          if-no-files-found: warn

  package-lite:
    name: "📦 Package Universal Lite"
    if: false # Temporarily disabled since x86_64 is disabled
    needs: build-arch
    runs-on: macos-14
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Prepare build
        run: |
          chmod +x build_distribution.sh 2>/dev/null || true
          VERSION="${{ needs.build-arch.outputs.version }}"
          sed -i '' "s/^VERSION=\".*\"/VERSION=\"${VERSION}\"/" build_distribution.sh 2>/dev/null || true
          mkdir -p .build_dist/arm64 .build_dist/x86_64

      - name: Download ARM64 binaries
        uses: actions/download-artifact@v4
        with:
          name: raw-binaries-arm64
          path: .build_dist/arm64/

      - name: Download x86_64 binaries
        uses: actions/download-artifact@v4
        with:
          name: raw-binaries-x86_64
          path: .build_dist/x86_64/

      - name: "🏗️ Package Lite Universal DMG"
        run: ./build_distribution.sh --mode lite-only

      - name: Collect DMG
        run: |
          mkdir -p build-output
          cp Dist/Lite/*.dmg build-output/ 2>/dev/null || true

      - name: Upload Lite DMG
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ needs.build-arch.outputs.version }}-${{ needs.build-arch.outputs.short_sha }}-lite
          path: build-output/
          retention-days: 14
          if-no-files-found: warn

  # ══════════════════════════════════════════════════════════════════════════
  # Job 4: Test (parallel with build, depends on security)
  # ══════════════════════════════════════════════════════════════════════════
  test:
    name: "🧪 Test"
    needs: security
    runs-on: macos-14
    timeout-minutes: 30
    if: "!inputs.skip_tests && !startsWith(github.ref, 'refs/tags/v')"

    steps:
      - uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install Rust toolchain
        run: |
          brew unlink rustup 2>/dev/null || true
          brew unlink rustup-init 2>/dev/null || true
          if ! ~/.cargo/bin/cargo --version &>/dev/null; then
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable --no-modify-path
          fi
          source "$HOME/.cargo/env"
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
          ~/.cargo/bin/cargo --version
          ~/.cargo/bin/rustc --version

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            backend -> target
          shared-key: microcode-rust-test

      - name: Swift tests
        run: |
          echo "🧪 Running Swift tests..."
          swift test 2>&1 | tail -30 || true
        continue-on-error: true

      - name: Rust tests
        run: |
          if [ -d "backend" ]; then
            echo "🧪 Running Rust tests..."
            cd backend
            cargo test 2>&1 | tail -30 || true
          fi
        continue-on-error: true

      - name: Integration smoke test
        run: |
          echo "🔥 Running smoke tests..."
          # Verify critical files exist
          for f in Package.swift CHECKSUMS.sha256 LICENSE README.md; do
            if [ -f "$f" ]; then
              echo "  ✅ $f"
            else
              echo "  ❌ $f missing!"
            fi
          done

          # Verify build scripts are executable
          for s in build_distribution.sh generate_checksums.sh verify_checksums.sh; do
            if [ -f "$s" ] && [ -x "$s" ]; then
              echo "  ✅ $s (executable)"
            elif [ -f "$s" ]; then
              echo "  ⚠️  $s (not executable)"
            fi
          done

  # ══════════════════════════════════════════════════════════════════════════
  # Job 5: Auto-Update Checksums (only on main branch push, not tags/PRs)
  # ══════════════════════════════════════════════════════════════════════════
  checksums:
    name: "🔒 Auto-Checksums"
    needs: [build-arch]
    runs-on: macos-14
    timeout-minutes: 5
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && !startsWith(github.ref, 'refs/tags/')

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Regenerate checksums
        run: |
          if [ -f "generate_checksums.sh" ]; then
            chmod +x generate_checksums.sh
            ./generate_checksums.sh
          fi

      - name: Commit updated checksums (if changed)
        run: |
          git config user.name "MicroCode CI"
          git config user.email "ci@dotmini.dev"
          if ! git diff --quiet CHECKSUMS.sha256 2>/dev/null; then
            git add CHECKSUMS.sha256
            git commit -m "🔒 Auto-update SHA256 checksums [skip ci]"
            git push
            echo "✅ Checksums updated and pushed"
          else
            echo "✅ Checksums already up to date"
          fi

  # ══════════════════════════════════════════════════════════════════════════
  # Job 6: Release (ONLY on tag push v*.*.*)
  # ══════════════════════════════════════════════════════════════════════════
  release:
    name: "🚀 Release"
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-arch]
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: dist-*
          path: artifacts/
          merge-multiple: true

      - name: Generate release checksums
        run: |
          VERSION="${{ needs.build-arch.outputs.version }}"
          echo "# MicroCode v${VERSION} — SHA256 Checksums" > SHA256SUMS.txt
          echo "# Generated: $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> SHA256SUMS.txt
          echo "" >> SHA256SUMS.txt
          # Only checksum actual MicroCode release artifacts (not dependency test fixtures)
          find artifacts/ -maxdepth 2 -type f \( -name "*microcode_*" -o -name "*MicroCode_*" \) \( -name "*.dmg" -o -name "*.pkg" \) | sort | while read f; do
            sha256sum "$f" >> SHA256SUMS.txt
          done
          cat SHA256SUMS.txt

      - name: Collect release assets
        run: |
          mkdir -p release-assets
          # Only copy actual MicroCode artifacts — NOT random .zip test fixtures from dependencies
          find artifacts/ -maxdepth 2 -type f -name "*microcode_*" \( -name "*.dmg" -o -name "*.pkg" \) -exec cp {} release-assets/ \;
          find artifacts/ -maxdepth 2 -type f -name "*MicroCode_*" \( -name "*.dmg" -o -name "*.pkg" \) -exec cp {} release-assets/ \;
          cp SHA256SUMS.txt release-assets/ 2>/dev/null || true
          echo "📦 Release assets:"
          ls -lh release-assets/

      - name: Generate changelog
        id: changelog
        run: |
          VERSION="${{ needs.build-arch.outputs.version }}"
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

          if [ -n "$PREV_TAG" ]; then
            FEATURES=$(git log --pretty=format:"- %s" "${PREV_TAG}..HEAD" --grep="feat\|add\|new\|upgrade" -i | head -15)
            FIXES=$(git log --pretty=format:"- %s" "${PREV_TAG}..HEAD" --grep="fix\|bug\|patch\|resolve" -i | head -10)
            OTHER=$(git log --pretty=format:"- %s (%h)" "${PREV_TAG}..HEAD" | head -20)
            COMPARE="[Compare changes](https://github.com/${{ github.repository }}/compare/${PREV_TAG}...v${VERSION})"
          else
            OTHER=$(git log --pretty=format:"- %s (%h)" -20)
            COMPARE=""
          fi

          cat > release-body.md << 'HEREDOC'
          ## MicroCode v${{ needs.build-arch.outputs.version }}

          **Build:** ${{ needs.build-arch.outputs.build_number }} | **License:** MPL v1.0

          ### 📥 Downloads
          | Platform | DMG | PKG |
          |----------|-----|-----|
          | **Apple Silicon (ARM64)** | ✅ | ✅ |
          | **Intel (x86_64)** | ✅ | ✅ |

          ### ⚙️ Requirements
          - macOS 13.0 (Ventura) or later
          - Apple Silicon or Intel Mac

          HEREDOC

          if [ -n "$FEATURES" ]; then
            echo "### ✨ New Features" >> release-body.md
            echo "$FEATURES" >> release-body.md
            echo "" >> release-body.md
          fi

          if [ -n "$FIXES" ]; then
            echo "### 🐛 Bug Fixes" >> release-body.md
            echo "$FIXES" >> release-body.md
            echo "" >> release-body.md
          fi

          echo "### 📋 All Changes" >> release-body.md
          echo "$OTHER" >> release-body.md
          echo "" >> release-body.md

          if [ -n "$COMPARE" ]; then
            echo "$COMPARE" >> release-body.md
            echo "" >> release-body.md
          fi

          cat >> release-body.md << 'HEREDOC'

          ### 🔐 Verify Download
          ```bash
          # Verify file integrity after download
          shasum -a 256 -c SHA256SUMS.txt
          ```

          ### 📜 License
          MicroCode Public License (MPL) v1.0 — Free for personal & educational use.
          Commercial use requires a Commercial License Agreement. See [LICENSE](LICENSE).

          ---
          <sub>Built with ❤️ in Thailand 🇹🇭 by Dotmini Software</sub>
          HEREDOC

      - name: Delete existing release if any
        run: |
          gh release delete "${{ github.ref_name }}" \
            --repo ${{ github.repository }} \
            --yes 2>/dev/null || true
          echo "✅ Old release cleared (or none existed)"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        run: |
          IS_PRE="false"
          REF="${{ github.ref_name }}"
          VERSION="${{ needs.build-arch.outputs.version }}"
          if echo "$REF $VERSION" | grep -qiE 'developer|beta|alpha|-'; then
            IS_PRE="true"
          fi

          gh release create "${{ github.ref_name }}" \
            release-assets/* \
            --repo ${{ github.repository }} \
            --title "MicroCode ${VERSION}" \
            --notes-file release-body.md \
            --prerelease="$IS_PRE" \
            --verify-tag
          echo "✅ Release created: https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ══════════════════════════════════════════════════════════════════════════
  # Job 7: Notify (after release, optional)
  # ══════════════════════════════════════════════════════════════════════════
  notify:
    name: "📢 Notify"
    if: startsWith(github.ref, 'refs/tags/v') && always()
    needs: [release]
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Release summary
        run: |
          if [ "${{ needs.release.result }}" == "success" ]; then
            echo "✅ MicroCode v${{ needs.build-arch.outputs.version }} released successfully!"
            echo "   URL: https://github.com/${{ github.repository }}/releases/latest"
          else
            echo "❌ Release failed. Check the logs."
          fi
