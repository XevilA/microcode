# ╔══════════════════════════════════════════════════════════════════════════╗
# ║  MicroCode — Single Unified CI/CD Pipeline                             ║
# ║  One workflow. No duplication. No waste.                                ║
# ╚══════════════════════════════════════════════════════════════════════════╝

name: "CI/CD"

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  APP_NAME: MicroCode
  BUNDLE_ID: com.dotmini.codetunner
  MACOSX_DEPLOYMENT_TARGET: "13.0"

jobs:
  # ══════════════════════════════════════════════════════════════════════════
  # Job 1: Security Check (runs on every push/PR, fast)
  # ══════════════════════════════════════════════════════════════════════════
  security:
    name: "🔐 Security"
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify SHA256 checksums
        run: |
          if [ -f "CHECKSUMS.sha256" ] && [ -f "verify_checksums.sh" ]; then
            chmod +x verify_checksums.sh
            ./verify_checksums.sh
          else
            echo "⚠️ No checksums found — skipping"
          fi

      - name: Scan for secrets
        run: |
          echo "🔍 Scanning for hardcoded secrets..."
          FOUND=0

          # API keys
          if grep -rE "AIza[a-zA-Z0-9_-]{30,}" --include="*.swift" --include="*.rs" 2>/dev/null; then
            echo "❌ Found Google API key"; FOUND=1
          fi
          if grep -rE "sk-[a-zA-Z0-9]{20,}" --include="*.swift" --include="*.rs" 2>/dev/null | grep -v 'placeholder\|"sk-..."'; then
            echo "❌ Found OpenAI key"; FOUND=1
          fi

          # Hardcoded IPs (non-localhost)
          if grep -rE "http://[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+" --include="*.swift" --include="*.rs" 2>/dev/null | grep -v "127.0.0.1"; then
            echo "❌ Found hardcoded IP"; FOUND=1
          fi

          if [ $FOUND -eq 1 ]; then
            echo "🚨 Secret scan FAILED"
            exit 1
          fi
          echo "✅ No secrets found"

  # ══════════════════════════════════════════════════════════════════════════
  # Job 2: Build (runs on every push/PR)
  # ══════════════════════════════════════════════════════════════════════════
  build:
    name: "🔨 Build"
    needs: security
    runs-on: macos-14
    timeout-minutes: 60

    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          elif git describe --tags --abbrev=0 2>/dev/null; then
            VERSION="$(git describe --tags --abbrev=0 | sed 's/^v//')"
          else
            VERSION="1.0.0"
          fi
          BUILD_NUMBER=$(git rev-list --count HEAD)
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "build_number=${BUILD_NUMBER}" >> $GITHUB_OUTPUT
          echo "📦 Version: ${VERSION} (build ${BUILD_NUMBER})"

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Install protobuf
        run: brew install protobuf

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            backend -> target
            microcode_core -> target
          shared-key: microcode-rust

      - name: Cache Swift PM
        uses: actions/cache@v4
        with:
          path: .build
          key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.resolved') }}
          restore-keys: ${{ runner.os }}-spm-

      - name: Prepare
        run: |
          chmod +x build_distribution.sh bundle_runtimes.sh generate_checksums.sh 2>/dev/null || true
          VERSION="${{ steps.version.outputs.version }}"
          sed -i '' "s/^VERSION=\".*\"/VERSION=\"${VERSION}\"/" build_distribution.sh

      - name: "🏗️ Full Distribution Build"
        run: ./build_distribution.sh
        env:
          CI: true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: Dist/
          retention-days: 7

  # ══════════════════════════════════════════════════════════════════════════
  # Job 3: Release (ONLY on tag push v*.*.*)
  # ══════════════════════════════════════════════════════════════════════════
  release:
    name: "🚀 Release"
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: Dist/

      - name: Generate checksums
        run: |
          VERSION="${{ needs.build.outputs.version }}"
          echo "# MicroCode v${VERSION} — SHA256" > Dist/SHA256SUMS.txt
          find Dist/ -type f \( -name "*.dmg" -o -name "*.pkg" \) | sort | while read f; do
            sha256sum "$f" >> Dist/SHA256SUMS.txt
          done
          cat Dist/SHA256SUMS.txt

      - name: Collect assets
        run: |
          mkdir -p release-assets
          find Dist/ -name "*.dmg" -exec cp {} release-assets/ \;
          find Dist/ -name "*.pkg" -exec cp {} release-assets/ \;
          cp Dist/SHA256SUMS.txt release-assets/ 2>/dev/null || true
          echo "📦 Release assets:"
          ls -lh release-assets/

      - name: Generate changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            CHANGES=$(git log --pretty=format:"- %s (%h)" "${PREV_TAG}..HEAD" | head -30)
          else
            CHANGES=$(git log --pretty=format:"- %s (%h)" -15)
          fi

          cat > release-body.md << EOF
          ## MicroCode v${{ needs.build.outputs.version }}

          ### 📥 Downloads
          | Variant | DMG | PKG |
          |---------|-----|-----|
          | **Apple Silicon (ARM64)** | ✅ | ✅ |
          | **Intel (x86_64)** | ✅ | ✅ |

          ### ⚙️ Requirements
          - macOS 13.0 (Ventura) or later

          ### 📋 Changes
          ${CHANGES}

          ### 🔐 Verify
          \`\`\`bash
          sha256sum -c SHA256SUMS.txt
          \`\`\`
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "MicroCode v${{ needs.build.outputs.version }}"
          body_path: release-body.md
          draft: false
          prerelease: ${{ contains(needs.build.outputs.version, '-') }}
          files: release-assets/*
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
