# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║  MicroCode Release — Auto-publish GitHub Release on tag push              ║
# ║  Trigger: git tag v1.2.3 && git push --tags                              ║
# ╚══════════════════════════════════════════════════════════════════════════════╝

name: "🚀 Release"

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

env:
  APP_NAME: MicroCode
  BUNDLE_ID: com.dotmini.codetunner
  MACOSX_DEPLOYMENT_TARGET: "13.0"

jobs:
  # ============================================================================
  # Stage 1: Build everything
  # ============================================================================
  build-release:
    name: "🔨 Release Build"
    runs-on: macos-14
    timeout-minutes: 90

    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          BUILD_NUMBER=$(git rev-list --count HEAD)
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "build_number=${BUILD_NUMBER}" >> $GITHUB_OUTPUT
          echo "🏷️ Release version: ${VERSION} (build ${BUILD_NUMBER})"

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            backend -> target
            microcode_core -> target
          shared-key: "microcode-rust-release"

      - name: Cache Swift PM
        uses: actions/cache@v4
        with:
          path: .build
          key: ${{ runner.os }}-spm-release-${{ hashFiles('**/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Prepare build
        run: |
          chmod +x build_distribution.sh bundle_runtimes.sh generate_checksums.sh 2>/dev/null || true
          VERSION="${{ steps.version.outputs.version }}"
          sed -i '' "s/^VERSION=\".*\"/VERSION=\"${VERSION}\"/" build_distribution.sh

      - name: "🏗️ Full Distribution Build"
        run: ./build_distribution.sh
        env:
          CI: true

      - name: Upload build output
        uses: actions/upload-artifact@v4
        with:
          name: release-dist
          path: Dist/
          retention-days: 1

  # ============================================================================
  # Stage 2: Sign & Notarize (if secrets available)
  # ============================================================================
  sign:
    name: "🔐 Sign & Notarize"
    needs: build-release
    runs-on: macos-14
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-dist
          path: Dist/

      - name: Check if signing secrets exist
        id: check-secrets
        run: |
          if [ -n "${{ secrets.APPLE_CERTIFICATE_P12 }}" ]; then
            echo "has_signing=true" >> $GITHUB_OUTPUT
          else
            echo "has_signing=false" >> $GITHUB_OUTPUT
            echo "⚠️ No signing secrets found — producing unsigned release"
          fi

      - name: Import certificate
        if: steps.check-secrets.outputs.has_signing == 'true'
        env:
          APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          CERT_PATH=$RUNNER_TEMP/certificate.p12
          echo -n "$APPLE_CERTIFICATE_P12" | base64 --decode -o "$CERT_PATH"
          security import "$CERT_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH"

          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

      - name: Sign artifacts
        if: steps.check-secrets.outputs.has_signing == 'true'
        env:
          DEVELOPER_ID: ${{ secrets.APPLE_DEVELOPER_ID }}
        run: |
          find Dist/ -name "*.dmg" | while read dmg; do
            echo "🔐 Signing: $dmg"
            codesign --force --sign "$DEVELOPER_ID" --timestamp "$dmg"
          done

          INSTALLER_ID=$(echo "$DEVELOPER_ID" | sed 's/Developer ID Application/Developer ID Installer/')
          find Dist/ -name "*.pkg" | while read pkg; do
            echo "🔐 Signing: $pkg"
            productsign --sign "$INSTALLER_ID" "$pkg" "${pkg}.signed" && mv "${pkg}.signed" "$pkg" || true
          done

      - name: Notarize artifacts
        if: steps.check-secrets.outputs.has_signing == 'true'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          for artifact in $(find Dist/ -name "*.dmg" -o -name "*.pkg"); do
            echo "📤 Notarizing: $(basename $artifact)"
            xcrun notarytool submit "$artifact" \
              --apple-id "$APPLE_ID" \
              --password "$APP_PASSWORD" \
              --team-id "$TEAM_ID" \
              --wait --timeout 15m || echo "⚠️ Notarization failed for $artifact"

            echo "📌 Stapling: $(basename $artifact)"
            xcrun stapler staple "$artifact" || true
          done

      - name: Generate release checksums
        run: |
          VERSION="${{ needs.build-release.outputs.version }}"
          CHECKSUM_FILE="Dist/SHA256SUMS.txt"
          echo "# MicroCode v${VERSION} — SHA256 Checksums" > "$CHECKSUM_FILE"
          echo "# $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> "$CHECKSUM_FILE"
          echo "" >> "$CHECKSUM_FILE"
          find Dist/ -type f \( -name "*.dmg" -o -name "*.pkg" \) | sort | while read f; do
            shasum -a 256 "$f" >> "$CHECKSUM_FILE"
          done
          cat "$CHECKSUM_FILE"

      - name: Upload signed dist
        uses: actions/upload-artifact@v4
        with:
          name: release-dist-signed
          path: Dist/
          retention-days: 1

      - name: Cleanup keychain
        if: always()
        run: security delete-keychain $RUNNER_TEMP/signing.keychain-db 2>/dev/null || true

  # ============================================================================
  # Stage 3: Publish GitHub Release
  # ============================================================================
  publish:
    name: "🚀 Publish Release"
    needs: [build-release, sign]
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download signed artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-dist-signed
          path: Dist/

      - name: Collect release assets
        run: |
          mkdir -p release-assets
          VERSION="${{ needs.build-release.outputs.version }}"

          # Flatten all DMGs and PKGs into release-assets/ with clean names
          find Dist/ -name "*.dmg" | while read f; do
            BASENAME=$(basename "$f")
            cp "$f" "release-assets/${BASENAME}"
          done

          find Dist/ -name "*.pkg" | while read f; do
            BASENAME=$(basename "$f")
            cp "$f" "release-assets/${BASENAME}"
          done

          # Copy checksums
          cp Dist/SHA256SUMS.txt release-assets/ 2>/dev/null || true

          echo "📦 Release assets:"
          ls -lh release-assets/

      - name: Generate changelog
        id: changelog
        run: |
          # Get changes since last tag
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            CHANGES=$(git log --pretty=format:"- %s (%h)" "${PREV_TAG}..HEAD" | head -50)
          else
            CHANGES=$(git log --pretty=format:"- %s (%h)" -20)
          fi

          # Write release body
          cat > release-body.md << EOF
          ## MicroCode v${{ needs.build-release.outputs.version }}

          ### 📥 Downloads

          | Variant | DMG | PKG |
          |---------|-----|-----|
          | **Apple Silicon (ARM64)** — Full with bundled runtimes | ✅ | ✅ |
          | **Intel (x86_64)** — Full with bundled runtimes | ✅ | ✅ |
          | **Universal Lite** — Lightweight, no bundled runtimes | ✅ | ✅ |

          ### ⚙️ System Requirements
          - macOS 13.0 (Ventura) or later
          - Apple Silicon or Intel Mac

          ### 📋 Changes
          ${CHANGES}

          ### 🔐 Verification
          \`\`\`bash
          shasum -a 256 -c SHA256SUMS.txt
          \`\`\`
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "MicroCode v${{ needs.build-release.outputs.version }}"
          body_path: release-body.md
          draft: false
          prerelease: ${{ contains(needs.build-release.outputs.version, '-') }}
          files: release-assets/*
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
