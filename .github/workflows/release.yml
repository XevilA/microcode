name: "Release CD"

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Release Version (e.g., 2.0.0)"
        required: true
        default: "2.0.0"

permissions:
  contents: write

env:
  APP_NAME: CodeTunner
  BUNDLE_ID: com.dotmini.codetunner
  MACOSX_DEPLOYMENT_TARGET: "13.0"
  RUST_BACKTRACE: 1

jobs:
  build-and-release:
    name: "Build, Sign, and Release"
    runs-on: macos-14
    timeout-minutes: 60

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install System Dependencies
        run: |
          brew install protobuf 2>/dev/null || true
          brew install create-dmg 2>/dev/null || true

      - name: Install Rust Toolchain
        run: |
          brew unlink rustup 2>/dev/null || true
          brew unlink rustup-init 2>/dev/null || true
          if ! command -v rustup &>/dev/null || ! ~/.cargo/bin/cargo --version &>/dev/null; then
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable --no-modify-path
          fi
          source "$HOME/.cargo/env"
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
          rustup target add aarch64-apple-darwin
          rustup target add x86_64-apple-darwin

      - name: Detect Version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          elif [[ -n "${{ github.event.inputs.version }}" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="1.0.0"
          fi
          echo "VERSION=${VERSION}" >> $GITHUB_ENV
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Setup Apple Certificate
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Create variables
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          # Import certificate from secrets
          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH

          # Create temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # Import certificate to keychain
          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # Add keychain to search list
          security list-keychain -d user -s $KEYCHAIN_PATH

      - name: Build Application (ARM64 & Intel)
        run: |
          source "$HOME/.cargo/env"
          chmod +x build_distribution.sh bundle_runtimes.sh sign_and_notarize.sh
          ./build_distribution.sh --mode full --version "${VERSION}"
          ./build_distribution.sh --mode lite-only --version "${VERSION}"

      - name: Sign and Notarize Artifacts
        env:
          DEVELOPER_ID: ${{ secrets.APPLE_DEV_ID }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          # Array of variants to sign and notarize
          VARIANTS=("arm64" "x86_64" "Lite")
          NAMES=("Dotmini_CodeTunner_ARM64_Full" "Dotmini_CodeTunner_Intel_Full" "Dotmini_CodeTunner_Lite")

          for i in "${!VARIANTS[@]}"; do
            VARIANT="${VARIANTS[$i]}"
            NAME="${NAMES[$i]}"
            
            echo "========================================"
            echo "🚀 Signing and Notarizing: $NAME ($VARIANT)"
            echo "========================================"

            if [ -d "Dist/${VARIANT}/CodeTunner.app" ]; then
                export APP_PATH="$(pwd)/Dist/${VARIANT}/CodeTunner.app"
            elif [ -d "Dist/${VARIANT}/codetunner.app" ]; then
                export APP_PATH="$(pwd)/Dist/${VARIANT}/codetunner.app"
            else
                echo "❌ APP not found for variant $VARIANT"
                exit 1
            fi

            export DMG_PATH="$(pwd)/Dist/${VARIANT}/${NAME}.dmg"
            export PKG_PATH="$(pwd)/Dist/${VARIANT}/${NAME}.pkg"
            export VERSION="${VERSION}"

            ./sign_and_notarize.sh all
          done

      - name: Generate Checksums
        run: |
          echo "# CodeTunner v${VERSION} — SHA256 Checksums" > SHA256SUMS.txt
          echo "# Generated: $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> SHA256SUMS.txt
          echo "" >> SHA256SUMS.txt
          find Dist -type f \( -name "*.dmg" -o -name "*.pkg" \) | sort | while read f; do
            filename=$(basename "$f")
            shasum -a 256 "$f" | awk '{print $1 "  " "'"$filename"'"}' >> SHA256SUMS.txt
          done

      - name: Collect Release Assets
        run: |
          mkdir -p release-assets
          find Dist -type f \( -name "*.dmg" -o -name "*.pkg" \) -exec cp {} release-assets/ \;
          cp SHA256SUMS.txt release-assets/

      - name: Generate Changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            CHANGES=$(git log --pretty=format:"- %s (%h)" "${PREV_TAG}..HEAD" | head -50)
          else
            CHANGES=$(git log --pretty=format:"- %s (%h)" -50)
          fi

          cat > release-body.md << HEREDOC
          ## CodeTunner v${VERSION}

          ### 📥 Downloads
          | Platform | DMG | PKG |
          |----------|-----|-----|
          | **Apple Silicon (ARM64)** | ✅ | ✅ |
          | **Intel (x86_64)** | ✅ | ✅ |
          | **Universal Lite** | ✅ | ✅ |

          ### ⚙️ Requirements
          - macOS 13.0 (Ventura) or later

          ### 📋 Changes
          $CHANGES

          ### 🔐 Verify Download
          \`\`\`bash
          shasum -a 256 -c SHA256SUMS.txt
          \`\`\`
          HEREDOC

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Delete if exists
          gh release delete "v${VERSION}" --repo ${{ github.repository }} --yes 2>/dev/null || true
          
          # Create new release
          gh release create "v${VERSION}" \
            release-assets/* \
            --repo ${{ github.repository }} \
            --title "CodeTunner v${VERSION}" \
            --notes-file release-body.md \
            --target ${{ github.sha }}
          echo "✅ Release created!"
