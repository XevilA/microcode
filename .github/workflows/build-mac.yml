# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║  MicroCode CI/CD — Build, Sign, Notarize, Package                         ║
# ║  Produces: .app / .dmg / .pkg for ARM64, Intel, Universal Lite            ║
# ╚══════════════════════════════════════════════════════════════════════════════╝

name: MicroCode CI/CD Bundle Pipeline

on:
  push:
    branches: [ "main", "release/*" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build variant'
        required: true
        default: 'full'
        type: choice
        options:
          - full
          - dev
      sign_and_notarize:
        description: 'Sign & Notarize (requires secrets)'
        required: true
        default: false
        type: boolean

# Cancel in-progress runs on the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  APP_NAME: MicroCode
  BUNDLE_ID: com.dotmini.codetunner
  MACOSX_DEPLOYMENT_TARGET: "13.0"

jobs:
  # ============================================================================
  # Stage 1: Build
  # ============================================================================
  build:
    name: "🔨 Build (${{ github.event.inputs.build_type || 'full' }})"
    runs-on: macos-14
    timeout-minutes: 60

    outputs:
      version: ${{ steps.version.outputs.version }}
      build_number: ${{ steps.version.outputs.build_number }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for version detection

      - name: Detect version from git
        id: version
        run: |
          # Try to get version from latest tag
          if git describe --tags --abbrev=0 2>/dev/null; then
            RAW_TAG=$(git describe --tags --abbrev=0)
            VERSION="${RAW_TAG#v}"  # Strip leading 'v'
          else
            VERSION="1.0.0"
          fi
          BUILD_NUMBER=$(git rev-list --count HEAD)
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "build_number=${BUILD_NUMBER}" >> $GITHUB_OUTPUT
          echo "📦 Version: ${VERSION} (build ${BUILD_NUMBER})"

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin
          components: rustfmt, clippy

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            backend -> target
            microcode_core -> target
          shared-key: "microcode-rust"

      - name: Cache Swift PM
        uses: actions/cache@v4
        with:
          path: .build
          key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Set build script permissions
        run: |
          chmod +x build_distribution.sh bundle_runtimes.sh generate_checksums.sh 2>/dev/null || true

      - name: Inject version into build
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          BUILD_NUM="${{ steps.version.outputs.build_number }}"
          # Patch build_distribution.sh with detected version
          sed -i '' "s/^VERSION=\".*\"/VERSION=\"${VERSION}\"/" build_distribution.sh
          echo "✅ Injected version ${VERSION} (build ${BUILD_NUM})"

      # -- Full Build (ARM64 + Intel + Universal) --
      - name: "🏗️ Full Distribution Build"
        if: github.event.inputs.build_type != 'dev'
        run: ./build_distribution.sh
        env:
          CI: true

      # -- Dev Build (Host arch only, no DMG/PKG) --
      - name: "🏗️ Quick Dev Build"
        if: github.event.inputs.build_type == 'dev'
        run: ./build_distribution.sh --dev
        env:
          CI: true

      - name: Generate checksums
        run: |
          cd Dist
          echo "# MicroCode ${VERSION} — SHA256 Checksums" > SHA256SUMS.txt
          echo "# Generated: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> SHA256SUMS.txt
          echo "" >> SHA256SUMS.txt
          find . -type f \( -name "*.dmg" -o -name "*.pkg" \) | sort | while read f; do
            shasum -a 256 "$f" >> SHA256SUMS.txt
          done
          cat SHA256SUMS.txt

      # -- Upload Artifacts --
      - name: "📤 Upload ARM64 DMG + PKG"
        if: github.event.inputs.build_type != 'dev'
        uses: actions/upload-artifact@v4
        with:
          name: MicroCode-ARM64-macOS
          path: |
            Dist/arm64/*.dmg
            Dist/arm64/*.pkg
          retention-days: 14

      - name: "📤 Upload Intel DMG + PKG"
        if: github.event.inputs.build_type != 'dev'
        uses: actions/upload-artifact@v4
        with:
          name: MicroCode-Intel-macOS
          path: |
            Dist/x86_64/*.dmg
            Dist/x86_64/*.pkg
          retention-days: 14

      - name: "📤 Upload Universal Lite DMG + PKG"
        if: github.event.inputs.build_type != 'dev'
        uses: actions/upload-artifact@v4
        with:
          name: MicroCode-Lite-Universal-macOS
          path: |
            Dist/Lite/*.dmg
            Dist/Lite/*.pkg
          retention-days: 14

      - name: "📤 Upload Checksums"
        if: github.event.inputs.build_type != 'dev'
        uses: actions/upload-artifact@v4
        with:
          name: SHA256SUMS
          path: Dist/SHA256SUMS.txt
          retention-days: 14

      - name: "📤 Upload Dev App Bundle"
        if: github.event.inputs.build_type == 'dev'
        uses: actions/upload-artifact@v4
        with:
          name: MicroCode-Dev-AppBundle
          path: Dist/Dev/MicroCode.app
          retention-days: 3

  # ============================================================================
  # Stage 2: Sign & Notarize (optional — requires Apple Developer secrets)
  # ============================================================================
  sign-and-notarize:
    name: "🔐 Sign & Notarize"
    needs: build
    runs-on: macos-14
    if: >-
      github.event.inputs.sign_and_notarize == 'true' ||
      (github.ref_type == 'tag' && startsWith(github.ref_name, 'v'))
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Import Apple Developer certificate
        env:
          APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          # Create a temporary keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import certificate
          CERT_PATH=$RUNNER_TEMP/certificate.p12
          echo -n "$APPLE_CERTIFICATE_P12" | base64 --decode -o "$CERT_PATH"
          security import "$CERT_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH"

          # Allow codesign to access the keychain
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

          echo "✅ Certificate imported to temporary keychain"

      - name: Create entitlements
        run: |
          cat > /tmp/entitlements.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>com.apple.security.cs.allow-jit</key>
              <true/>
              <key>com.apple.security.cs.allow-unsigned-executable-memory</key>
              <true/>
              <key>com.apple.security.cs.disable-library-validation</key>
              <true/>
              <key>com.apple.security.network.client</key>
              <true/>
              <key>com.apple.security.network.server</key>
              <true/>
              <key>com.apple.security.files.user-selected.read-write</key>
              <true/>
              <key>com.apple.security.files.bookmarks.app-scope</key>
              <true/>
              <key>com.apple.security.device.camera</key>
              <true/>
              <key>com.apple.security.device.usb</key>
              <true/>
              <key>com.apple.security.cs.allow-dyld-environment-variables</key>
              <true/>
              <key>com.apple.security.automation.apple-events</key>
              <true/>
          </dict>
          </plist>
          EOF

      - name: Sign DMG & PKG artifacts
        env:
          DEVELOPER_ID: ${{ secrets.APPLE_DEVELOPER_ID }}
        run: |
          echo "🔐 Signing all DMG and PKG artifacts..."

          # Sign DMGs
          find artifacts/ -name "*.dmg" | while read dmg; do
            echo "   Signing: $dmg"
            codesign --force --sign "$DEVELOPER_ID" --timestamp "$dmg"
          done

          # Sign PKGs (requires Developer ID Installer certificate)
          INSTALLER_ID=$(echo "$DEVELOPER_ID" | sed 's/Developer ID Application/Developer ID Installer/')
          find artifacts/ -name "*.pkg" | while read pkg; do
            echo "   Signing: $pkg"
            productsign --sign "$INSTALLER_ID" "$pkg" "${pkg}.signed" && mv "${pkg}.signed" "$pkg" || true
          done

          echo "✅ All artifacts signed"

      - name: Notarize DMGs
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          echo "📤 Submitting artifacts for notarization..."

          find artifacts/ -name "*.dmg" | while read dmg; do
            echo "   Notarizing: $(basename $dmg)"
            xcrun notarytool submit "$dmg" \
              --apple-id "$APPLE_ID" \
              --password "$APP_PASSWORD" \
              --team-id "$TEAM_ID" \
              --wait --timeout 15m

            echo "   📌 Stapling: $(basename $dmg)"
            xcrun stapler staple "$dmg"
          done

          echo "✅ Notarization complete"

      - name: Notarize PKGs
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          find artifacts/ -name "*.pkg" | while read pkg; do
            echo "   Notarizing: $(basename $pkg)"
            xcrun notarytool submit "$pkg" \
              --apple-id "$APPLE_ID" \
              --password "$APP_PASSWORD" \
              --team-id "$TEAM_ID" \
              --wait --timeout 15m

            echo "   📌 Stapling: $(basename $pkg)"
            xcrun stapler staple "$pkg"
          done

      - name: Re-generate checksums (post-signing)
        run: |
          echo "# MicroCode — SHA256 Checksums (Signed & Notarized)" > artifacts/SHA256SUMS.txt
          echo "# Generated: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> artifacts/SHA256SUMS.txt
          echo "" >> artifacts/SHA256SUMS.txt
          find artifacts/ -type f \( -name "*.dmg" -o -name "*.pkg" \) | sort | while read f; do
            shasum -a 256 "$f" >> artifacts/SHA256SUMS.txt
          done
          cat artifacts/SHA256SUMS.txt

      - name: "📤 Upload signed artifacts"
        uses: actions/upload-artifact@v4
        with:
          name: MicroCode-Signed-All
          path: |
            artifacts/**/*.dmg
            artifacts/**/*.pkg
            artifacts/SHA256SUMS.txt
          retention-days: 30

      - name: Cleanup keychain
        if: always()
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db 2>/dev/null || true
